name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build configuration
        required: true
        default: release
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - main
    paths:
      - '.github/workflows/ios-build.yml'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'build/build_ios.sh'
      - 'apps/flutter_app/**'
      - 'bridge/**'
      - 'cpp/**'
      - 'cmake/**'
      - 'vcpkg/**'

permissions:
  contents: read

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 120
    env:
      BUILD_TYPE: ${{ inputs.build_type || 'release' }}
      VCPKG_DEFAULT_BINARY_CACHE: /Users/runner/.cache/vcpkg/archives
      HOMEBREW_NO_AUTO_UPDATE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          sw_vers
          xcodebuild -version
          flutter --version
          cmake --version

      - name: Ensure build tools are installed
        run: |
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"
          brew install ninja autoconf automake autoconf-archive libtool pkg-config bison ccache
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi

      - name: Verify host build tools
        run: |
          export PATH="$(brew --prefix bison)/bin:$(brew --prefix)/bin:$PATH"
          command -v ninja
          command -v bison
          command -v autoreconf
          command -v automake
          command -v autoconf
          ninja --version
          bison --version

      - name: Prepare cache directories
        run: |
          mkdir -p /Users/runner/.cache/vcpkg/archives
          ls -ld /Users/runner/.cache/vcpkg/archives

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods
            apps/flutter_app/ios/Pods
          key: v2-${{ runner.os }}-pods-${{ hashFiles('apps/flutter_app/ios/Podfile.lock', 'apps/flutter_app/pubspec.lock', 'bridge/flutter_engine_bridge/ios/flutter_engine_bridge.podspec') }}
          restore-keys: |
            v2-${{ runner.os }}-pods-

      - name: Restore vcpkg tool cache
        uses: actions/cache/restore@v4
        with:
          path: .devtools/vcpkg
          key: v3-${{ runner.os }}-vcpkg-ios-${{ hashFiles('vcpkg/**', 'CMakeLists.txt', 'CMakePresets.json', 'build/build_ios.sh', '.github/workflows/ios-build.yml') }}
          restore-keys: |
            v3-${{ runner.os }}-vcpkg-ios-

      - name: Restore vcpkg binary cache
        uses: actions/cache/restore@v4
        with:
          path: /Users/runner/.cache/vcpkg/archives
          key: v1-${{ runner.os }}-vcpkg-bin-ios-${{ hashFiles('vcpkg/**', 'CMakeLists.txt', 'CMakePresets.json', 'build/build_ios.sh', '.github/workflows/ios-build.yml') }}
          restore-keys: |
            v1-${{ runner.os }}-vcpkg-bin-ios-

      - name: Restore incremental iOS build dir
        uses: actions/cache/restore@v4
        with:
          path: out/ios
          key: v1-${{ runner.os }}-out-ios-${{ env.BUILD_TYPE }}-${{ github.sha }}
          restore-keys: |
            v1-${{ runner.os }}-out-ios-${{ env.BUILD_TYPE }}-
            v1-${{ runner.os }}-out-ios-

      - name: Build unsigned iOS app
        id: build_ios
        continue-on-error: true
        run: |
          export PATH="$(brew --prefix bison)/bin:$(brew --prefix)/bin:$PATH"
          chmod +x build/build_ios.sh
          ./build/build_ios.sh "${BUILD_TYPE}"

      - name: Diagnose iOS link inputs
        if: always()
        run: |
          export PATH="$(brew --prefix bison)/bin:$(brew --prefix)/bin:$PATH"
          echo "===== DIAG LINK 1: Flutter iOS plugin libs ====="
          find "bridge/flutter_engine_bridge/ios/Libs" -maxdepth 1 -name '*.a' | sort || true
          echo "===== DIAG LINK 2: libengine_project symbols ====="
          nm -gU "bridge/flutter_engine_bridge/ios/Libs/libengine_project.a" 2>/dev/null | head -n 80 || true
          echo "===== DIAG LINK 3: libengine_project members ====="
          ar -t "bridge/flutter_engine_bridge/ios/Libs/libengine_project.a" 2>/dev/null | head -n 120 || true

      - name: Collect Flutter/Xcode logs
        if: failure()
        run: |
          echo "===== DIAG LINK 4: Xcode DerivedData logs ====="
          find ~/Library/Developer/Xcode/DerivedData -path '*Logs/Build*' \( -name '*.xcactivitylog' -o -name '*.log' \) | tail -n 50 || true
          echo "===== DIAG LINK 5: Flutter build logs ====="
          find apps/flutter_app build out -type f \( -name '*.log' -o -name '*.xcresult' \) | sort | tail -n 100 || true
          echo "===== DIAG LINK 6: Pod build settings snippets ====="
          grep -RIn "OTHER_LDFLAGS\|libengine_project\|libengine_vendors\|force_load" apps/flutter_app/ios build/ios bridge/flutter_engine_bridge/ios --exclude-dir=.git | head -n 200 || true

      - name: Save incremental iOS build dir
        if: always()
        uses: actions/cache/save@v4
        with:
          path: out/ios
          key: v1-${{ runner.os }}-out-ios-${{ env.BUILD_TYPE }}-${{ github.sha }}

      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /Users/runner/.cache/vcpkg/archives
          key: v1-${{ runner.os }}-vcpkg-bin-ios-${{ hashFiles('vcpkg/**', 'CMakeLists.txt', 'CMakePresets.json', 'build/build_ios.sh', '.github/workflows/ios-build.yml') }}

      - name: Fail if build failed
        if: steps.build_ios.outcome != 'success'
        run: |
          echo "iOS build failed"
          exit 1

      - name: Save vcpkg tool cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .devtools/vcpkg
          key: v3-${{ runner.os }}-vcpkg-ios-${{ hashFiles('vcpkg/**', 'CMakeLists.txt', 'CMakePresets.json', 'build/build_ios.sh', '.github/workflows/ios-build.yml') }}

      - name: Archive build artifacts
        run: |
          mkdir -p artifacts
          cp -R apps/flutter_app/build/ios/iphoneos/Runner.app "artifacts/Runner-${BUILD_TYPE}.app"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app-${{ env.BUILD_TYPE }}
          path: artifacts/Runner-${{ env.BUILD_TYPE }}.app
          if-no-files-found: error
          retention-days: 14
